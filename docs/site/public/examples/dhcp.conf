# DHCP on wired Ethernet — minimal example
# Use with: go-udap set <mac> --config dhcp.conf --reboot
#
# Omitted on purpose:
#   lan_ip_mode=1   — DHCP is the NVRAM factory default
#   interface=1     — go-udap v2.1.0+ substitutes wired when the
#                     NVRAM interface byte is at its factory sentinel
#                     and --interface is not passed (a stderr notice
#                     reports the substitution). On earlier versions,
#                     uncomment the line below.
# interface=1

server_address=192.168.1.250
