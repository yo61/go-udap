# DHCP on wired Ethernet — minimal example
# Use with: go-udap set <mac> --config dhcp.conf --reboot
#
# Devices default to DHCP. go-udap v2.1.0+ also defaults to wired
# Ethernet on factory-fresh devices when --interface is omitted.
# On earlier versions, uncomment the interface line.
# interface=1

server_address=192.168.1.250
