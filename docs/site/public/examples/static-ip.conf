# Static IP on wired Ethernet
# Use with: go-udap set <mac> --config static-ip.conf --reboot
# Edit the network addresses below to match your subnet.
interface=1
lan_ip_mode=0
lan_network_address=192.168.1.50
lan_subnet_mask=255.255.255.0
lan_gateway=192.168.1.1
primary_dns=192.168.1.1
secondary_dns=8.8.8.8

# Set your music server's IP:
server_address=192.168.1.250
