version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: go-udap
    main: .
    binary: go-udap
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X go-udap/cli.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: go-udap
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    formats:
      - tar.gz
    files:
      - LICENSE
      - README.md
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: 'SHA256SUMS'
  algorithm: sha256

# Create the GitHub release as a draft so we can upload assets to it.
# Repository immutability locks releases at publish time, which would block
# asset uploads if the release were created already-published. The
# goreleaser.yaml workflow runs `gh release edit --draft=false` after this
# step to publish (and lock immutability) only once all assets are in place.
release:
  draft: true

brews:
  - name: go-udap
    repository:
      owner: yo61
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/yo61/go-udap"
    description: "Squeezebox UDAP configuration tool"
    license: MIT
    test: |
      assert_match "go-udap", shell_output("#{bin}/go-udap --version")
      assert_match "Usage:", shell_output("#{bin}/go-udap --help")
      assert_match "unknown command", shell_output("#{bin}/go-udap floop 2>&1", 1)
    install: |
      bin.install "go-udap"

changelog:
  disable: true
