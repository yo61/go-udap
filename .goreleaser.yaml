version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: go-udap
    main: .
    binary: go-udap
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X go-udap/cli.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: go-udap
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    formats:
      - tar.gz
    files:
      - LICENSE
      - README.md
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: 'SHA256SUMS'
  algorithm: sha256

changelog:
  disable: true
