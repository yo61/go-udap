version: 2

before:
  hooks:
    - go mod tidy
    - mkdir -p ./completions
    - go run . __dump-completions ./completions

builds:
  - id: go-udap
    main: .
    binary: go-udap
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X go-udap/cli.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: go-udap
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    formats:
      - tar.gz
    files:
      - LICENSE
      - README.md
      - src: completions/go-udap.bash
        dst: completions/go-udap.bash
      - src: completions/_go-udap
        dst: completions/_go-udap
      - src: completions/go-udap.fish
        dst: completions/go-udap.fish
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: 'SHA256SUMS'
  algorithm: sha256

# release-please creates an empty draft release for the tag (see
# .release-please-config.json: "draft": true). Reuse that existing
# draft instead of creating a second one: GoReleaser otherwise creates
# its own draft, uploads assets there, and the workflow's un-draft
# step publishes the wrong (empty) release (see issue #71).
#
# Uploading to a draft sidesteps repo immutability, which locks at
# publish time. draft: false then publishes the same release object
# in a single EditRelease call once all assets are uploaded — no
# second release object, no ambiguity, no manual un-draft step.
release:
  draft: false
  use_existing_draft: true

homebrew_casks:
  - name: go-udap
    repository:
      owner: yo61
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/yo61/go-udap"
    description: "Squeezebox UDAP configuration tool"
    license: MIT
    url:
      verified: github.com/yo61/go-udap
    completions:
      bash: completions/go-udap.bash
      zsh: completions/_go-udap
      fish: completions/go-udap.fish
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/go-udap"]
          end

changelog:
  use: github
