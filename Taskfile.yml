version: '3'

vars:
  BINARY_NAME: go-udap
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null | sed 's/^v//' || echo dev
  LDFLAGS: -s -w -X go-udap/cli.Version={{.VERSION}}
  MOCKSBR_LDFLAGS: -s -w -X main.Version={{.VERSION}}
  BUILD_FLAGS: -ldflags="{{.LDFLAGS}}" -trimpath
  MOCKSBR_BUILD_FLAGS: -ldflags="{{.MOCKSBR_LDFLAGS}}" -trimpath

tasks:
  default:
    desc: Build optimized binary for current platform
    cmds:
      - go build {{.BUILD_FLAGS}} -o {{.BINARY_NAME}} .
    sources:
      - "**/*.go"
    generates:
      - "{{.BINARY_NAME}}"

  build:
    desc: Build optimized binary for current platform
    cmds:
      - task: default

  build:windows:
    desc: Cross-compile for Windows (amd64)
    cmds:
      - GOOS=windows GOARCH=amd64 go build {{.BUILD_FLAGS}} -o {{.BINARY_NAME}}.exe .
    sources:
      - "**/*.go"
    generates:
      - "{{.BINARY_NAME}}.exe"

  build:linux:
    desc: Cross-compile for Linux (amd64)
    cmds:
      - GOOS=linux GOARCH=amd64 go build {{.BUILD_FLAGS}} -o {{.BINARY_NAME}}-linux-amd64 .
    sources:
      - "**/*.go"
    generates:
      - "{{.BINARY_NAME}}-linux-amd64"

  build:linux-arm64:
    desc: Cross-compile for Linux (arm64)
    cmds:
      - GOOS=linux GOARCH=arm64 go build {{.BUILD_FLAGS}} -o {{.BINARY_NAME}}-linux-arm64 .
    sources:
      - "**/*.go"
    generates:
      - "{{.BINARY_NAME}}-linux-arm64"

  build:mocksbr:
    desc: Build mocksbr binary for current platform with version stamped (output at ./bin/mocksbr)
    cmds:
      - mkdir -p bin
      - go build {{.MOCKSBR_BUILD_FLAGS}} -o bin/mocksbr ./cmd/mocksbr
    sources:
      - "**/*.go"
    generates:
      - bin/mocksbr

  build:all:
    desc: Build for all platforms
    cmds:
      - task: build
      - task: build:windows
      - task: build:linux
      - task: build:linux-arm64

  release:
    desc: Build all platforms and UPX-compress the Linux/Windows binaries
      (~67% smaller). Requires upx in PATH (`brew install upx`). Skips
      macOS — modern macOS rejects UPX-packed binaries by default.
    deps: [build:all]
    cmds:
      - command -v upx >/dev/null || { echo "upx not found; install with 'brew install upx'"; exit 1; }
      - upx --best --lzma {{.BINARY_NAME}}-linux-amd64
      - upx --best --lzma {{.BINARY_NAME}}-linux-arm64
      - upx --best --lzma {{.BINARY_NAME}}.exe

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  test:verbose:
    desc: Run all tests with verbose output
    cmds:
      - go test -v ./...

  test:coverage:
    desc: Run tests with coverage report
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report generated at coverage.html"

  fmt:
    desc: Format all Go files
    cmds:
      - go fmt ./...

  lint:
    desc: Run go vet
    cmds:
      - go vet ./...

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY_NAME}} {{.BINARY_NAME}}.exe
      - rm -f {{.BINARY_NAME}}-linux-amd64 {{.BINARY_NAME}}-linux-arm64
      - rm -rf bin/
      - rm -f coverage.out coverage.html

  run:
    desc: Build and print help (CLI is single-shot; pass args explicitly)
    cmds:
      - task: build
      - ./{{.BINARY_NAME}} --help

  dev:
    desc: Run without building; pass CLI args via -- (e.g. task dev -- discover)
    cmds:
      - go run . {{.CLI_ARGS}}
