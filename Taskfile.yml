version: '3'

vars:
  BINARY_NAME: go-udap
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null | sed 's/^v//' || echo dev
  LDFLAGS: -s -w -X go-udap/cli.Version={{.VERSION}}
  MOCKSBR_LDFLAGS: -s -w -X main.Version={{.VERSION}}
  BUILD_FLAGS: -ldflags="{{.LDFLAGS}}" -trimpath
  MOCKSBR_BUILD_FLAGS: -ldflags="{{.MOCKSBR_LDFLAGS}}" -trimpath

tasks:
  default:
    desc: Build optimized binary for current platform
    cmds:
      - go build {{.BUILD_FLAGS}} -o {{.BINARY_NAME}} .
    sources:
      - "**/*.go"
    generates:
      - "{{.BINARY_NAME}}"

  build:
    desc: Build optimized binary for current platform
    cmds:
      - task: default

  build:windows:
    desc: Cross-compile for Windows (amd64)
    cmds:
      - GOOS=windows GOARCH=amd64 go build {{.BUILD_FLAGS}} -o {{.BINARY_NAME}}.exe .
    sources:
      - "**/*.go"
    generates:
      - "{{.BINARY_NAME}}.exe"

  build:linux:
    desc: Cross-compile for Linux (amd64)
    cmds:
      - GOOS=linux GOARCH=amd64 go build {{.BUILD_FLAGS}} -o {{.BINARY_NAME}}-linux-amd64 .
    sources:
      - "**/*.go"
    generates:
      - "{{.BINARY_NAME}}-linux-amd64"

  build:linux-arm64:
    desc: Cross-compile for Linux (arm64)
    cmds:
      - GOOS=linux GOARCH=arm64 go build {{.BUILD_FLAGS}} -o {{.BINARY_NAME}}-linux-arm64 .
    sources:
      - "**/*.go"
    generates:
      - "{{.BINARY_NAME}}-linux-arm64"

  build:mocksbr:
    desc: Build mocksbr binary for current platform with version stamped (output at ./bin/mocksbr)
    cmds:
      - mkdir -p bin
      - go build {{.MOCKSBR_BUILD_FLAGS}} -o bin/mocksbr ./cmd/mocksbr
    sources:
      - "**/*.go"
    generates:
      - bin/mocksbr

  build:all:
    desc: Build for all platforms
    cmds:
      - task: build
      - task: build:windows
      - task: build:linux
      - task: build:linux-arm64

  release:
    desc: Build all platforms and UPX-compress the Linux/Windows binaries
      (~67% smaller). Requires upx in PATH (`brew install upx`). Skips
      macOS — modern macOS rejects UPX-packed binaries by default.
    deps: [build:all]
    cmds:
      - command -v upx >/dev/null || { echo "upx not found; install with 'brew install upx'"; exit 1; }
      - upx --best --lzma {{.BINARY_NAME}}-linux-amd64
      - upx --best --lzma {{.BINARY_NAME}}-linux-arm64
      - upx --best --lzma {{.BINARY_NAME}}.exe

  release:stats:
    desc: Print a table of GitHub release-asset download counts.
      Thin wrapper over the gh-release-stats extension. Install once
      with `gh extension install yo61/gh-release-stats`. Pass extra
      flags via CLI_ARGS (e.g. `task release:stats -- --json`).
    cmds:
      - gh release-stats {{.CLI_ARGS}}

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  test:verbose:
    desc: Run all tests with verbose output
    cmds:
      - go test -v ./...

  test:coverage:
    desc: Run tests with coverage report
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report generated at coverage.html"

  fmt:
    desc: Format all Go files
    cmds:
      - go fmt ./...

  lint:
    desc: Run go vet
    cmds:
      - go vet ./...

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  completions:
    desc: Generate shell completion scripts into ./completions
    cmds:
      - mkdir -p ./completions
      - go run . __dump-completions ./completions
      - echo "Wrote ./completions/{go-udap.bash,_go-udap,go-udap.fish}"

  man:
    desc: Generate man pages (section 1) from the cobra command tree into ./man.
      Produces go-udap.1 and one go-udap-<sub>.1 per visible subcommand.
      Runs in goreleaser's before-hooks so release archives ship them too.
    cmds:
      - go run ./cmd/docs ./man

  docs:dev:
    desc: Run the Fumadocs site locally with hot reload at http://localhost:3000.
      Strips the GitHub Pages basePath (/go-udap) via BASE_PATH= so assets
      resolve under root, not /go-udap/_next/...
    dir: docs/site
    cmds:
      - BASE_PATH= pnpm dev

  docs:serve:
    desc: Production-build the Fumadocs site (no basePath) and serve it at
      http://localhost:3000. Use this to preview the production output before
      pushing; for hot-reload editing use 'task docs:dev'.
    dir: docs/site
    cmds:
      - BASE_PATH= SITE_URL=http://localhost:3000 pnpm build
      - pnpm start

  docs:build:
    desc: Production build of the Fumadocs site with /go-udap basePath (matches
      .github/workflows/docs.yaml output). Use this to reproduce the CI build
      locally; for local viewing use 'task docs:serve' instead.
    dir: docs/site
    cmds:
      - pnpm build

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY_NAME}} {{.BINARY_NAME}}.exe
      - rm -f {{.BINARY_NAME}}-linux-amd64 {{.BINARY_NAME}}-linux-arm64
      - rm -rf bin/ man/
      - rm -f coverage.out coverage.html

  run:
    desc: Build and print help (CLI is single-shot; pass args explicitly)
    cmds:
      - task: build
      - ./{{.BINARY_NAME}} --help

  dev:
    desc: Run without building; pass CLI args via -- (e.g. task dev -- discover)
    cmds:
      - go run . {{.CLI_ARGS}}

  mutate:
    desc: 'Run mutation testing against udap/getdata_response.go (protocol
      parser; clean unit tests, deterministic results). Requires
      go-mutesting: `go install
      github.com/avito-tech/go-mutesting/cmd/go-mutesting@latest`.
      Whole-package runs against ./udap/... are unreliable here because
      timing-sensitive tests (Slow injection, --timeout assertions) flake
      under concurrent mutation runs and produce noisy "survivor" lists.
      Use this target for periodic audits of protocol-parsing files only;
      target other files explicitly via `go-mutesting <file>`. Not run
      in CI — too slow per-PR.'
    cmds:
      - command -v go-mutesting >/dev/null || { echo "go-mutesting not in PATH; run 'go install github.com/avito-tech/go-mutesting/cmd/go-mutesting@latest'"; exit 1; }
      - go-mutesting udap/getdata_response.go

  security:
    desc: 'Run govulncheck + grype locally (matches CI). govulncheck is
      Go-native and reachability-aware; grype scans an in-process SBOM
      for broader CVE coverage. Both are advisory locally — CI is
      authoritative. grype is optional (install with `brew install grype`).'
    cmds:
      - go run golang.org/x/vuln/cmd/govulncheck@latest ./...
      - |
        if command -v grype >/dev/null 2>&1; then
          grype dir:.
        else
          echo "grype not installed; skipping (brew install grype)" >&2
        fi

  update:all:
    desc: Refresh dependencies across all CLI-updatable ecosystems
      (Go modules, docs/site npm in-range, pre-commit hooks). GitHub
      Actions are tag-tracked by Dependabot, not Task. Run 'task test'
      and 'task docs:build' afterward to verify the bumps.
    cmds:
      - task: update:go
      - task: update:docs
      - task: update:hooks

  update:go:
    desc: Update Go modules to latest minor/patch within go.mod ranges
      and tidy go.sum.
    cmds:
      - go get -u ./...
      - go mod tidy

  update:docs:
    desc: Update docs/site npm dependencies within their semver ranges
      via pnpm. Writes the new in-range tip to both package.json
      (caret ranges) and pnpm-lock.yaml; exact-pinned versions are
      left alone — use 'update:docs-latest' to lift those.
    dir: docs/site
    cmds:
      - pnpm update

  update:docs-latest:
    desc: Update docs/site npm dependencies to the latest versions,
      ignoring semver ranges in package.json. May bump majors — review
      the diff and run 'task docs:build' before committing.
    dir: docs/site
    cmds:
      - pnpm update --latest

  update:hooks:
    desc: Update pre-commit hook revisions via 'prek auto-update'.
      Requires prek in PATH (https://github.com/j178/prek).
    cmds:
      - command -v prek >/dev/null || { echo "prek not in PATH; install per https://github.com/j178/prek"; exit 1; }
      - prek auto-update
