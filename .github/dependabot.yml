version: 2
updates:
  # Pre-existing: pre-commit hook updates (don't remove)
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      hooks:
        patterns: ["*"]

  # Go module updates
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      gomod-minor-patch:
        update-types: ["minor", "patch"]

  # GitHub Actions updates (SHA-pinned actions get tag-tracking PRs)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      actions-minor-patch:
        update-types: ["minor", "patch"]

  # docs/site is pnpm-managed; Dependabot auto-detects pnpm-lock.yaml
  - package-ecosystem: "npm"
    directory: "/docs/site"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    ignore:
      # TypeScript 7.x is the native (Go) compiler; it drops the JS compiler
      # API that `next build` loads for type-checking. Hold on 6.x until the
      # Next.js/fumadocs toolchain supports the native compiler.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      docs-site-minor-patch:
        update-types: ["minor", "patch"]
