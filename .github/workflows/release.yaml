name: Release

# release-please opens / updates a Release PR on every push to main
# that contains version-bumping commits (feat, fix, etc., per
# conventional commits). Merging the Release PR cuts the actual
# release — the tag, the GitHub release (created in draft state), and
# the CHANGELOG update all land together. GoReleaser then fires on the
# tag push, uploads binaries to the existing draft release, and
# un-drafts it.
#
# Convention: use `docs:` (not `feat(docs):`) for documentation-only
# changes so they don't trigger a version bump. Bump-triggering types:
# feat (minor), fix (patch), perf (patch). BREAKING CHANGE in the
# commit body bumps major.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'yo61'
    steps:
      - id: create_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          client-id: ${{ secrets.SEMANTIC_RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.SEMANTIC_RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        with:
          token: ${{ steps.create_token.outputs.token }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
