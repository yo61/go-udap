name: Release

# release-please manages two artifacts on pushes to main:
#   1. the Release PR — opened/updated when main has version-bumping
#      commits (feat/fix/perf, per conventional commits).
#   2. the GitHub release — cut when a Release PR merges. The release is
#      created in draft state, the manifest is bumped, and the CHANGELOG
#      is updated. This workflow then pushes refs/tags/vX.Y.Z, which
#      triggers GoReleaser to upload binaries to the draft and publish it.
#
# The two responsibilities are split across two release-please steps so
# the next-version PR scan never runs before the just-created release's
# tag exists. A single combined invocation would create the draft
# release and immediately scan for the next version — but a draft release
# has no git tag ref yet (GitHub stores tag_name as metadata only; the
# ref is pushed in a later step). With no tag to anchor to, release-please
# reports "No latest release found", walks the entire history from
# bootstrap-sha, and re-surfaces already-shipped BREAKING CHANGE footers
# as a phantom major-bump PR (#136, #155).
#
# Ordering that avoids the race:
#   1. release-only scan (skip-github-pull-request: true) — creates the
#      draft release; never opens a PR, so no phantom is possible.
#   2. push refs/tags/vX.Y.Z for the draft release.
#   3. PR-only scan (skip-github-release: true) — runs last, after the tag
#      exists, so it anchors to the new release and opens/updates the real
#      next-version PR (or none, when there is nothing to release).
#
# Convention: use `docs:` (not `feat(docs):`) for documentation-only
# changes so they don't trigger a version bump. Bump-triggering types:
# feat (minor), fix (patch), perf (patch). BREAKING CHANGE in the
# commit body bumps major.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'yo61'
    steps:
      - id: create_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          client-id: ${{ secrets.SEMANTIC_RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.SEMANTIC_RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          # Scope the token to this repo and the minimum scopes
          # release-please needs: contents (branches, tags, releases)
          # and pull-requests (the release PR, including its labels —
          # PRs are issues in the API, so pull-requests covers labeling).
          # Only request scopes the App installation actually holds; an
          # unheld scope (e.g. issues) makes token minting fail with 422.
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write

      # Release-only scan: creates the draft GitHub release when a Release
      # PR was merged, and emits release_created / tag_name / sha for the
      # tag-push step. skip-github-pull-request suppresses the next-version
      # scan here — that scan must wait until the tag ref exists (final
      # step), or it walks full history and opens a phantom major-bump PR.
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        with:
          token: ${{ steps.create_token.outputs.token }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-pull-request: true

      # release-please-action does not push refs/tags/<tag> when the
      # release is created as a draft (GitHub's data model: draft
      # releases store tag_name as metadata only). The App token is
      # used so the tag push event re-triggers downstream workflows;
      # pushes authored by the default GITHUB_TOKEN do not.
      - name: Push git tag for draft release
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ steps.create_token.outputs.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.release.outputs.tag_name }}
          SHA: ${{ steps.release.outputs.sha }}
        run: |
          gh api -X POST "repos/${REPO}/git/refs" \
            -f "ref=refs/tags/${TAG}" \
            -f "sha=${SHA}"

      # PR-only scan: opens/updates the next-version Release PR. Not gated
      # on release_created, so ordinary feature pushes still get a Release
      # PR. On a release run it executes after the tag push above, so it
      # anchors to the new tag instead of walking full history.
      # skip-github-release avoids re-processing the release the first step
      # already created.
      - name: Open or update the next-version Release PR
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        with:
          token: ${{ steps.create_token.outputs.token }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-release: true
