name: Release

# Triggered by a successful CI run on main, not by the push itself, so
# semantic-release can never cut a tag from a commit that fails go vet
# or tests. The previous push-triggered config let v1.3.2 ship from a
# vet-failing tree because the Release and CI workflows fired in
# parallel: when CI failed on the merge result, semantic-release had
# already finished tagging.
#
# CI runs on every push to main (no path filter), so this workflow
# fires for every successful CI on main. Pushes that change only
# non-Go files still trigger CI and therefore this workflow, but
# semantic-release no-ops when there are no feat/fix commits since
# the last tag — no spurious releases get cut.
on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: >-
      github.repository_owner == 'yo61' &&
      (github.event_name == 'workflow_dispatch' ||
       github.event.workflow_run.conclusion == 'success')
    steps:
      - id: create_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.SEMANTIC_RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.SEMANTIC_RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: cycjimmy/semantic-release-action@v6
        with:
          semantic_version: 25.0.3
          extra_plugins: |
            @semantic-release/changelog@6.0.3
            @semantic-release/git@10.0.1
            conventional-changelog-conventionalcommits@9.3.1
        env:
          GITHUB_TOKEN: ${{ steps.create_token.outputs.token }}
