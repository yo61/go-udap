name: GoReleaser

on:
  push:
    tags:
      # Full SemVer match across the four valid forms:
      #   vX.Y.Z              (e.g. v0.3.0)
      #   vX.Y.Z-prerelease   (e.g. v0.3.0-rc.1)
      #   vX.Y.Z+build        (e.g. v0.3.0+build.123)
      #   vX.Y.Z-prerelease+build
      # Rejects junk like "vfoo", "v0.3", "v1.0-rc1" (missing patch).
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
      - 'v[0-9]+.[0-9]+.[0-9]+\+*'
      - 'v[0-9]+.[0-9]+.[0-9]+-*\+*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - id: tap_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          client-id: ${{ secrets.SEMANTIC_RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.SEMANTIC_RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            go-udap
            homebrew-tap
          # Scope to the minimum: goreleaser only uses this token to push
          # the updated formula to homebrew-tap (contents write).
          permission-contents: write

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: go.mod
          # Release build: skip setup-go's dependency cache to avoid a
          # poisoned cache tainting published artifacts (zizmor cache-poisoning).
          cache: false

      # GoReleaser's sboms: block (see .goreleaser.yaml) shells out to
      # the syft binary on $PATH. goreleaser-action does NOT bundle
      # syft, so we install it explicitly. download-syft drops the
      # binary on $PATH without running anchore/sbom-action's own SBOM
      # step (goreleaser owns the per-archive cataloging).
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0

      # GoReleaser reuses release-please's existing draft (see
      # .goreleaser.yaml: use_existing_draft) and publishes it in a
      # single EditRelease call by setting draft=false. No separate
      # un-draft step needed; that pattern (issue #71) caused us to
      # publish the wrong release object when two drafts coexisted.
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94  # v7.2.3
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ steps.tap_token.outputs.token }}

      # GoReleaser's cask generator emits a trailing blank line that `brew style`
      # rejects. The tap's test-bot lints the WHOLE tap, so one unstyled cask
      # blocks every formula's bump PR from bottling. Run `brew style --fix` on
      # the cask GoReleaser just pushed and commit the result. The
      # SEMANTIC_RELEASE App bypasses the tap's protected main (it is the same
      # token GoReleaser pushes the cask with).
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@6eaeff80e7e5c43087c0e5eb5aa82120399e9c91  # master @ 2026-05-22

      - name: Style-fix the generated cask in the tap
        env:
          APP_TOKEN: ${{ steps.tap_token.outputs.token }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          tap_dir="$(mktemp -d)"
          git clone --depth 1 \
            "https://x-access-token:${APP_TOKEN}@github.com/${OWNER}/homebrew-tap" \
            "$tap_dir"
          brew style --fix "$tap_dir/Casks/go-udap.rb"
          if git -C "$tap_dir" diff --quiet; then
            echo "cask already style-clean"
            exit 0
          fi
          git -C "$tap_dir" config user.name "goreleaserbot"
          git -C "$tap_dir" config user.email "goreleaserbot@users.noreply.github.com"
          git -C "$tap_dir" commit -am "style: brew style --fix go-udap cask"
          git -C "$tap_dir" push
