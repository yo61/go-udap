name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2025-vs2026]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test -race ./...

  # Run the same pre-commit hooks contributors run locally
  # (.pre-commit-config.yaml). commitlint is at the commit-msg stage
  # and is skipped by `prek run` automatically.
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: go.mod
      # dnephin/pre-commit-golang's go-imports hook calls goimports
      # directly; install it on PATH before prek runs.
      - run: go install golang.org/x/tools/cmd/goimports@latest
      - uses: j178/prek-action@e98a699c41eb69ab013a45817a0406469a748f8d  # v2.0.5
        with:
          prek-version: 0.3.13

  # Syntax-check the generated bash/zsh/fish completion scripts so a
  # malformed script can't ride out in a release.
  completion-smoke:
    name: completion-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: go.mod
      - name: Install zsh and fish
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends zsh fish
      - name: Generate completion scripts
        run: |
          mkdir -p ./completions
          go run . __dump-completions ./completions
          ls -la ./completions
      - name: Bash syntax check
        run: bash -n ./completions/go-udap.bash
      - name: Zsh syntax check
        run: zsh -n ./completions/_go-udap
      - name: Fish syntax check
        run: fish -c 'source ./completions/go-udap.fish'

  # Lint PR commit messages against Conventional Commits
  # (commitlint.config.mjs). commitlint is a commit-msg hook that
  # `prek run` skips, so the lint job above doesn't cover it.
  commitlint:
    name: Conventional Commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed  # v6.2.1
        with:
          configFile: commitlint.config.mjs
